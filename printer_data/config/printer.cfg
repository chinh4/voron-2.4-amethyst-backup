[include mainsail.cfg]
[include macros.cfg]
[include autotune_tmc.cfg]

########################################
# MCUs
########################################

# host MCU
[mcu CB1]
serial: /tmp/klipper_host_mcu

# manta m8p MCU
[mcu]
canbus_uuid: 3e22109f9a41

# EBB36 gen2 MCU
[mcu EBB]
canbus_uuid: a251b9a1bddf

# EBB36 gen2 MCU
[mcu eddy]
canbus_uuid: bb8998534806

########################################
# Printer
########################################

[printer]
kinematics: corexy
max_velocity: 650  
max_accel: 3000    			#Max 4000
max_z_velocity: 15 			#Max 15 for 12V TMC Drivers, can increase for 24V
max_z_accel: 350
square_corner_velocity: 5.0

########################################
# Motors
########################################

# X Stepper - B Motor
[stepper_x]
step_pin: PE6
dir_pin: PE5
enable_pin: !PC14
microsteps: 32
rotation_distance: 40
full_steps_per_rotation: 400
endstop_pin: tmc2209_stepper_x: virtual_endstop
position_min: 0
position_endstop: 350
position_max: 350
homing_speed: 65
homing_retract_dist: 5
homing_positive_dir: true

# Y Stepper - A Motor
[stepper_y]
step_pin: PE2
dir_pin: PE1
enable_pin: !PE4
microsteps: 32
rotation_distance: 40
endstop_pin: tmc2209_stepper_y: virtual_endstop
full_steps_per_rotation: 400
position_min: 0
position_endstop: 350
position_max: 350
homing_speed: 65
homing_retract_dist: 5
homing_positive_dir: true

## Z0 Stepper - Front Left on MOTOR3_A
[stepper_z]
step_pin: PB8
dir_pin: PB7
enable_pin: !PE0
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32
endstop_pin: probe: z_virtual_endstop
# position_endstop: 0
position_max: 340
position_min: -5
homing_speed: 8
second_homing_speed: 3
homing_retract_dist: 3

##	Z1 Stepper - Rear Left on Motor5
[stepper_z1]
step_pin: PG13
dir_pin: !PG12
enable_pin: !PG15
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##	Z2 Stepper - Rear Right on Motor6
[stepper_z2]
step_pin: PG9
dir_pin: PD7
enable_pin: !PG11
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

##	Z3 Stepper - Front Right on Motor7
[stepper_z3]
step_pin: PD4
dir_pin: !PD3
enable_pin: !PD6
rotation_distance: 40
gear_ratio: 80:16
microsteps: 32

########################################
# Extruder
########################################

# Extruder
[extruder]
step_pin: EBB:PB14
dir_pin: EBB:PA8
enable_pin: !EBB:PB6
microsteps: 16
full_steps_per_rotation: 200
rotation_distance: 4.590629999999999
max_extrude_only_distance: 500
max_extrude_only_velocity: 120
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: EBB:PB4
sensor_type: EPCOS 100K B57560G104F
pullup_resistor: 2200
sensor_pin: EBB:PA3
#control: pid
#pid_Kp: 21.527
#pid_Ki: 1.063
#pid_Kd: 108.982
min_temp: 0
max_temp: 300

########################################
# Motor Drivers
########################################

## Motor1
[tmc2209 stepper_x]
uart_pin: PC13
diag_pin: ^PF4
interpolate: true
run_current: 0.9
sense_resistor: 0.11
stealthchop_threshold: 999999

## Motor2
[tmc2209 stepper_y]
uart_pin: PE3
diag_pin: ^PF3
interpolate: true
run_current: 0.9
sense_resistor: 0.11
stealthchop_threshold: 999999

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z]
uart_pin: PB9
interpolate: true
run_current: 1.130
sense_resistor: 0.110
stealthchop_threshold: 0

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z1]
uart_pin: PG14
interpolate: true
run_current: 1.130
sense_resistor: 0.110
stealthchop_threshold: 0

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z2]
uart_pin: PG10
interpolate: true
run_current: 1.130
sense_resistor: 0.110
stealthchop_threshold: 0

##	Make sure to update below for your relevant driver (2208 or 2209)
[tmc2209 stepper_z3]
uart_pin: PD5
interpolate: true
run_current: 1.130
sense_resistor: 0.110
stealthchop_threshold: 0

## EBB36 extruder motor controller
[tmc2209 extruder]
uart_pin: EBB:PB3
interpolate: true
run_current: 0.85
hold_current: 0.100
sense_resistor: 0.11
stealthchop_threshold: 0
driver_TBL: 0
driver_HEND: 6
driver_HSTRT: 7
driver_TOFF: 4

[heater_bed]
heater_pin: PA1
sensor_pin: PB1 # TB 
sensor_type: ATC Semitec 104GT-2
#control: pid
min_temp: 0
max_temp: 120
#pid_kp: 58.437
#pid_ki: 2.347
#pid_kd: 363.769

########################################
# Fans
########################################

[fan]
pin: EBB:PD3

[heater_fan hotend_fan]
pin: EBB:PA5
heater: extruder
heater_temp: 50.0

[temperature_fan MCU_fan]
pin: PF6
sensor_type: temperature_host
sensor_path: /sys/class/thermal/thermal_zone0/temp
max_temp: 70.0
target_temp: 50.0
min_temp: 0
shutdown_speed: 0.0
kick_start_time: 0.5
max_speed: 1.0
min_speed: 0.2
control: pid
pid_Kp: 2.0
pid_Ki: 5.0
pid_Kd: 0.5
pid_deriv_time: 2.0

########################################
# Aliases
########################################

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE7, EXP1_2=PG1,
    EXP1_3=PG0, EXP1_4=PF15,
    EXP1_5=PF14, EXP1_6=PF13,    # Slot in the socket on this side
    EXP1_7=PF12, EXP1_8=PF11,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PE13, EXP2_2=PE12,
    EXP2_3=PE15, EXP2_4=PE11,
    EXP2_5=PE10, EXP2_6=PE14,      # Slot in the socket on this side
    EXP2_7=PE8, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=<NC>

########################################
# Host
########################################

[temperature_sensor CB1]
sensor_type: temperature_host
sensor_path: /sys/class/thermal/thermal_zone0/temp

########################################
# Manta M8P
########################################

[temperature_sensor manta_m8p]
sensor_type: temperature_mcu
sensor_mcu: mcu

########################################
# EBB36 Gen2
########################################

[temperature_sensor EBB36]
sensor_type: Generic 3950
sensor_pin: EBB:PA0
pullup_resistor: 2200

[lis2dw]
cs_pin: EBB:PB1
spi_bus: spi2_PB2_PB11_PB10
axes_map: x,y,z

########################################
# Eddy Duo
########################################

[probe_eddy_ng btt_eddy]
sensor_type: btt_eddy
i2c_mcu: eddy
i2c_bus: i2c0f
x_offset: 0
y_offset: 20

[temperature_sensor btt_eddy_mcu]
sensor_type: temperature_mcu
sensor_mcu: eddy
min_temp: 10
max_temp: 100

[temperature_sensor btt_eddy]
sensor_type: Generic 3950
sensor_pin: eddy:gpio26

########################################
# Bed Mesh
########################################

[bed_mesh]
speed: 300
horizontal_move_z: 2
mesh_min: 25, 25
mesh_max: 325, 325
probe_count: 15, 15
algorithm: bicubic

########################################
# Quad Gantry Level
########################################

[quad_gantry_level]
horizontal_move_z: 20.0
min_horizontal_move_z: 2.0
adaptive_horizontal_move_z: true
alternate_probe_direction: true
use_probe_xy_offsets: true
retries: 5
retry_tolerance: 0.0075
max_adjust: 20
speed: 95
gantry_corners:
  -60, -10
  410, 420
points:
  50, 50
  50, 300
  300, 300
  300, 50

########################################
# Homing
########################################

[safe_z_home]
home_xy_position: 175, 175
z_hop: 7

########################################
# Resonance Testing
########################################

[resonance_tester]
accel_chip: lis2dw
probe_points:
    175, 175, 20

########################################
# Shake Tune
########################################

[shaketune]

